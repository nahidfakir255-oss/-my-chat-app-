<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Chat2026</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 90vh; }
        #display { flex: 1; overflow-y: auto; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { padding: 10px; border-radius: 10px; margin: 5px 0; max-width: 70%; word-wrap: break-word; position: relative; font-size: 14px; }
        .sent { align-self: flex-end; background-color: #0084ff; color: white; }
        .received { align-self: flex-start; background-color: #e4e6eb; color: black; }
        .time { font-size: 10px; display: block; margin-top: 5px; opacity: 0.7; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #0084ff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #0084ff;">Chat2026</h2>
    <div id="display"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type a message...">
        <button onclick="send()">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://chat2026-6b219-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const msgRef = ref(db, "messages");

        window.send = function() {
            const text = document.getElementById("msg").value;
            if (text.trim() !== "") {
                push(msgRef, {
                    name: "Nahid", // আপনি চাইলে এখানে ইউজারের নাম পরিবর্তনশীল করতে পারেন
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    timestamp: serverTimestamp()
                });
                document.getElementById("msg").value = "";
            }
        };

        const display = document.getElementById("display");
        onChildAdded(msgRef, (data) => {
            const item = data.val();
            const div = document.createElement("div");
            div.className = `msg ${item.name === "Nahid" ? "sent" : "received"}`;
            div.innerHTML = `${item.text} <span class="time">${item.time}</span>`;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        });
    </script>
</body>
</html>
